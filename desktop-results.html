<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desktop-results</title>
    <link rel="stylesheet" href="desktop-results.css">
</head>
<body>
<div class="main-logo">
    <img src="assets/images/logo-large.svg" alt="Main logo">

    <div id="personal-best">
        <img src="assets/images/icon-personal-best.svg" alt="Personal best icon">
        <p id="personalBestValue">Personal best:</p>
    </div>
</div>

<div id="pattern-star-2">
    <img src="assets/images/pattern-star-2.svg" alt="Tick">
</div>


<div id="tick"><img src="assets/images/icon-completed.svg" alt="Tick">
<h1>Test Completed!</h1>
<p>Solid run. Keep pushing to beat your high score.</p></div>


<div id="boxes">
    <p>WPM:</p>
    <p>Accuracy: </p>
    <p>Characters: </p>
</div>

<div class="button-container">
    <button id="beat-this-score" >Go Again ⟳</button>
</div>

<div id="pattern-star-1">
    <img src="assets/images/pattern-star-1.svg" alt="star">
</div>

<script src="behaviour.js"></script>


</body>
</html>
