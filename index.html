<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Word Typing Website</title>
</head>
<body>
      <div class="main-logo">
        <img src="assets/images/logo-large.svg" alt="Main logo">

        <div id="personal-best">
            <img src="assets/images/icon-personal-best.svg" alt="Personal best icon">
            <p id="personalBestValue">Personal best:</p>
        </div>
    </div>

          <div class="stats-row">

          <div id="wpm-display">

              <p>WPM:</p>
              <p id="WPM">0</p>

              <div style="display:flex;height:30px;">
                  <div class="divider"></div>
              </div>

              <p>Accuracy:</p>
              <p id="accuracy">0</p>

              <div style="display:flex;height:30px;">
                  <div class="divider"></div>
              </div>

              <p>Time:</p>
              <p id="Timer">60</p>

          </div>

          <div id="difficultyAndMode">

              <p>Difficulty:</p>

              <div id="button">
                  <button id="easy">Easy</button>
                  <button id="medium">Medium</button>
                  <button id="hard">Hard</button>
              </div>

              <select id="difficultyDropdown">
                  <option>Easy</option>
                  <option>Medium</option>
                  <option selected>Hard</option>
              </select>

              <div style="display:flex;height:30px;">
                  <div class="divider"></div>
              </div>

              <p id="Mode">Mode:</p>

              <div id="modeButton">
                  <button id="timedButton">Timed (60s)</button>
                  <button id="PassageButton">Passage</button>
              </div>

              <select id="modeDropdown">
                  <option selected>Timed (60s)</option>
                  <option>Passage</option>
              </select>

          </div>

      </div>
      <hr>
      <div id="textToType">
      <button id="startButton">Start Typing Test</button>
      <p>or click the text and start typing</p>
      </div>

    <div id="display-text"></div>

        <script src="behaviour.js"></script>
  </body>
</html>
